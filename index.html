            from { opacity: 0; transform: translateY(10px); }

            from { transform: translateX(100%); }

        const ProductCard = ({ product, onOpen, onAddToCart, onToggleWishlist, isWishlisted }) => {
            const discount = Math.round(((product.oldPrice - product.price) / product.oldPrice) * 100);

            const handleCardClick = () => {
                trackEvent('select_item', {
                    items: [{
                        item_id: product.id,
                        item_name: product.name,
                        item_category: product.category,
                        item_brand: product.brand,
                        price: product.price,
                        index: 0
                    }]
                });
                onOpen(product);
            };

            return (
                <div className="product-card bg-white rounded-2xl overflow-hidden border border-slate-200 cursor-pointer group">
                    <div className="relative aspect-square overflow-hidden bg-slate-100" onClick={handleCardClick}>
                        <img

                            alt={product.name}
                            loading="lazy"
                            className="img-zoom w-full h-full object-cover"
                        />
                        <div className="absolute top-3 left-3 flex flex-col gap-2">

                            <button
                                onClick={(e) => { e.stopPropagation(); onAddToCart(product, 1); }}
                                className="w-full bg-slate-900 text-white py-2.5 rounded-xl font-medium text-sm hover:bg-slate-800 transition-colors flex items-center justify-center gap-2"
                            >
                                <Icon name="cart" className="w-4 h-4" />
                                Quick Add
                            </button>
                        </div>
                    </div>

                    <div className="p-4" onClick={handleCardClick}>
                        <div className="text-xs text-slate-500 mb-1">{product.brand} · {product.category}</div>
                        <h3 className="font-semibold text-slate-900 line-clamp-2 mb-2 min-h-[2.5rem]">{product.name}</h3>

                        <div className="flex items-center gap-1 mb-2">
                            <Icon name="star" className="w-3.5 h-3.5 star" />
                            <span className="text-sm font-medium text-slate-700">{product.rating}</span>
                            <span className="text-xs text-slate-500">({product.reviews})</span>
                        </div>

                        <div className="flex items-baseline gap-2">
                            <span className="text-lg font-bold text-slate-900">${product.price.toFixed(2)}</span>
                            {product.oldPrice && (
                                <span className="text-sm text-slate-400 line-through">${product.oldPrice.toFixed(2)}</span>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // PRODUCT MODAL
        // ==========================================
        const ProductModal = ({ product, onClose, onAddToCart, onBuyNow }) => {
            const [quantity, setQuantity] = useState(1);
            const [viewedTracked, setViewedTracked] = useState(false);

            useEffect(() => {
                if (product && !viewedTracked) {
                    trackEvent('view_item', {
                        currency: "USD",
                        value: product.price,
                        items: [{
                            item_id: product.id,
                            item_name: product.name,
                            item_category: product.category,
                            item_brand: product.brand,
                            price: product.price,
                            quantity: 1
                        }]
                    });
                    setViewedTracked(true);
                }
            }, [product, viewedTracked]);

            if (!product) return null;

            const handleAdd = () => {
                onAddToCart(product, quantity);
            };

            const handleBuyNow = () => {
                onBuyNow(product, quantity);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop animate-fadeIn" onClick={onClose}>
                    <div className="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl" onClick={(e) => e.stopPropagation()}>
                        <div className="grid md:grid-cols-2 gap-0">
                            <div className="aspect-square bg-slate-100">
                                <img src={product.image} alt={product.name} className="w-full h-full object-cover" />
                            </div>
                            <div className="p-6 md:p-8 relative">
                                <button onClick={onClose} className="absolute top-4 right-4 w-9 h-9 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center">
                                    <Icon name="close" className="w-4 h-4" />
                                </button>

                                <div className="text-sm text-slate-500 mb-1">{product.brand}</div>
                                <h2 className="text-2xl font-bold text-slate-900 mb-2">{product.name}</h2>

                                <div className="flex items-center gap-2 mb-4">
                                    <div className="flex items-center gap-0.5">
                                        {[...Array(5)].map((_, i) => (
                                            <Icon key={i} name="star" className={`w-4 h-4 ${i < Math.floor(product.rating) ? 'star' : 'text-slate-200'}`} />
                                        ))}
                                    </div>
                                    <span className="text-sm font-medium text-slate-700">{product.rating}</span>
                                    <span className="text-sm text-slate-500">({product.reviews} reviews)</span>
                                </div>

                                <div className="flex items-baseline gap-3 mb-4">
                                    <span className="text-3xl font-bold text-slate-900">${product.price.toFixed(2)}</span>
                                    {product.oldPrice && (
                                        <>
                                            <span className="text-lg text-slate-400 line-through">${product.oldPrice.toFixed(2)}</span>
                                            <span className="text-sm font-semibold text-red-600">
                                                Save ${(product.oldPrice - product.price).toFixed(2)}
                                            </span>
                                        </>
                                    )}
                                </div>

                                <p className="text-slate-600 mb-6">{product.description}</p>

                                <div className="flex items-center gap-3 mb-6">
                                    <span className="text-sm font-medium text-slate-700">Quantity:</span>
                                    <div className="flex items-center border border-slate-300 rounded-lg">
                                        <button
                                            onClick={() => setQuantity(Math.max(1, quantity - 1))}
                                            className="w-9 h-9 flex items-center justify-center hover:bg-slate-100"
                                        >
                                            <Icon name="minus" className="w-4 h-4" />
                                        </button>
                                        <span className="w-10 text-center font-semibold">{quantity}</span>
                                        <button
                                            onClick={() => setQuantity(quantity + 1)}
                                            className="w-9 h-9 flex items-center justify-center hover:bg-slate-100"
                                        >
                                            <Icon name="plus" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <span className="text-sm text-slate-500">In stock</span>
                                </div>

                                <div className="flex flex-col sm:flex-row gap-3">
                                    <button
                                        onClick={handleAdd}
                                        className="flex-1 border-2 border-slate-900 text-slate-900 py-3 rounded-xl font-semibold hover:bg-slate-50 transition-colors flex items-center justify-center gap-2"
                                    >
                                        <Icon name="cart" className="w-5 h-5" />
                                        Add to Cart
                                    </button>
                                    <button
                                        onClick={handleBuyNow}
                                        className="flex-1 bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-slate-800 transition-colors flex items-center justify-center gap-2"
                                    >
                                        <Icon name="bolt" className="w-5 h-5" />
                                        Buy Now
                                    </button>
                                </div>

                                <div className="mt-6 grid grid-cols-2 gap-3 text-xs text-slate-600">
                                    <div className="flex items-center gap-2">
                                        <Icon name="truck" className="w-4 h-4" />
                                        <span>Free shipping</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <Icon name="refresh" className="w-4 h-4" />
                                        <span>30-day returns</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <Icon name="shield" className="w-4 h-4" />
                                        <span>Secure payment</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <Icon name="badge" className="w-4 h-4" />
                                        <span>2-year warranty</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // CART DRAWER
        // ==========================================
        const CartDrawer = ({ isOpen, onClose, cart, onUpdateQty, onRemove, onCheckout }) => {
            const tracked = useRef(false);

            useEffect(() => {
                if (isOpen && cart.length > 0 && !tracked.current) {
                    trackEvent('view_cart', {
                        currency: "USD",
                        value: cart.reduce((sum, item) => sum + item.price * item.qty, 0),
                        items: cart.map(item => ({
                            item_id: item.id,
                            item_name: item.name,
                            item_category: item.category,
                            item_brand: item.brand,
                            price: item.price,
                            quantity: item.qty
                        }))
                    });
                    tracked.current = true;
                }
                if (!isOpen) tracked.current = false;
            }, [isOpen, cart]);

            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

            const handleRemove = (item) => {
                onRemove(item.id);
                trackEvent('remove_from_cart', {
                    currency: "USD",
                    value: item.price * item.qty,
                    items: [{
                        item_id: item.id,
                        item_name: item.name,
                        item_category: item.category,
                        item_brand: item.brand,
                        price: item.price,
                        quantity: item.qty
                    }]
                });
            };

            return (
                <>
                    {isOpen && <div className="fixed inset-0 z-40 bg-slate-900/50 backdrop-blur-sm animate-fadeIn" onClick={onClose} />}
                    <div className={`fixed top-0 right-0 z-50 h-full w-full max-w-md bg-white cart-drawer transform transition-transform duration-300 ${isOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex flex-col h-full">
                            <div className="flex items-center justify-between p-6 border-b border-slate-200">
                                <h2 className="text-xl font-bold text-slate-900">Your Cart ({cart.length})</h2>
                                <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center">
                                    <Icon name="close" className="w-5 h-5" />
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-6">
                                {cart.length === 0 ? (
                                    <div className="text-center py-12">
                                        <div className="w-20 h-20 mx-auto mb-4 bg-slate-100 rounded-full flex items-center justify-center">
                                            <Icon name="cart" className="w-10 h-10 text-slate-400" />
                                        </div>
                                        <h3 className="font-semibold text-slate-900 mb-2">Your cart is empty</h3>
                                        <p className="text-sm text-slate-500 mb-6">Add some products to get started</p>
                                        <button onClick={onClose} className="text-brand-600 font-medium hover:underline">
                                            Continue Shopping
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {cart.map(item => (
                                            <div key={item.id} className="flex gap-3 p-3 bg-slate-50 rounded-xl">
                                                <img src={item.image} alt={item.name} className="w-20 h-20 rounded-lg object-cover" />
                                                <div className="flex-1 min-w-0">
                                                    <h4 className="font-medium text-slate-900 text-sm line-clamp-2">{item.name}</h4>
                                                    <p className="text-xs text-slate-500 mb-2">{item.brand}</p>
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center border border-slate-300 rounded-md bg-white">
                                                            <button
                                                                onClick={() => onUpdateQty(item.id, item.qty - 1)}
                                                                className="w-7 h-7 flex items-center justify-center hover:bg-slate-100"
                                                            >
                                                                <Icon name="minus" className="w-3 h-3" />
                                                            </button>
                                                            <span className="w-7 text-center text-sm font-medium">{item.qty}</span>
                                                            <button
                                                                onClick={() => onUpdateQty(item.id, item.qty + 1)}
                                                                className="w-7 h-7 flex items-center justify-center hover:bg-slate-100"
                                                            >
                                                                <Icon name="plus" className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                        <span className="font-bold text-slate-900">${(item.price * item.qty).toFixed(2)}</span>
                                                    </div>
                                                </div>
                                                <button
                                                    onClick={() => handleRemove(item)}
                                                    className="text-slate-400 hover:text-red-500 h-7"
                                                    aria-label="Remove"
                                                >
                                                    <Icon name="trash" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {cart.length > 0 && (
                                <div className="p-6 border-t border-slate-200 bg-slate-50">
                                    <div className="space-y-2 mb-4">
                                        <div className="flex justify-between text-sm text-slate-600">
                                            <span>Subtotal</span>
                                            <span>${total.toFixed(2)}</span>
                                        </div>
                                        <div className="flex justify-between text-sm text-slate-600">
                                            <span>Shipping</span>
                                            <span className="text-emerald-600 font-medium">FREE</span>
                                        </div>
                                        <div className="divider-gradient my-2"></div>
                                        <div className="flex justify-between text-lg font-bold text-slate-900">
                                            <span>Total</span>
                                            <span>${total.toFixed(2)}</span>
                                        </div>
                                    </div>
                                    <button
                                        onClick={onCheckout}
                                        className="w-full bg-slate-900 text-white py-3.5 rounded-xl font-semibold hover:bg-slate-800 transition-colors flex items-center justify-center gap-2"
                                    >
                                        Proceed to Checkout
                                        <Icon name="arrow" className="w-4 h-4" />
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </>
            );
        };

        // ==========================================
        // CHECKOUT MODAL
        // ==========================================
        const CheckoutModal = ({ isOpen, onClose, cart, onComplete }) => {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                phone: '',
                address: '',
                city: '',
                zip: '',
                cardNumber: '',
                cardName: '',
                expiry: '',
                cvv: ''
            });
            const [step, setStep] = useState(1); // 1: shipping, 2: payment
            const shippingTracked = useRef(false);
            const paymentTracked = useRef(false);

            const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            const shipping = 0;
            const tax = subtotal * 0.08;
            const total = subtotal + shipping + tax;

            useEffect(() => {
                if (isOpen) {
                    trackEvent('begin_checkout', {
                        currency: "USD",
                        value: total,
                        items: cart.map(item => ({
                            item_id: item.id,
                            item_name: item.name,
                            item_category: item.category,
                            item_brand: item.brand,
                            price: item.price,
                            quantity: item.qty
                        }))
                    });
                    setStep(1);
                    shippingTracked.current = false;
                    paymentTracked.current = false;
                }
            }, [isOpen]);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleContinueToPayment = (e) => {
                e.preventDefault();
                if (!shippingTracked.current) {
                    trackEvent('add_shipping_info', {
                        currency: "USD",
                        value: total,
                        shipping_tier: "standard",
                        items: cart.map(item => ({
                            item_id: item.id,
                            item_name: item.name,
                            item_category: item.category,
                            item_brand: item.brand,
                            price: item.price,
                            quantity: item.qty
                        }))
                    });
                    shippingTracked.current = true;
                }
                setStep(2);
            };

            const handleCompletePurchase = (e) => {
                e.preventDefault();
                if (!paymentTracked.current) {
                    trackEvent('add_payment_info', {
                        currency: "USD",
                        value: total,
                        payment_type: "credit_card",
                        items: cart.map(item => ({
                            item_id: item.id,
                            item_name: item.name,
                            item_category: item.category,
                            item_brand: item.brand,
                            price: item.price,
                            quantity: item.qty
                        }))
                    });
                    paymentTracked.current = true;
                }
                onComplete({ ...formData, total });
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop animate-fadeIn" onClick={onClose}>
                    <div className="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl" onClick={(e) => e.stopPropagation()}>
                        <div className="p-6 border-b border-slate-200 flex items-center justify-between sticky top-0 bg-white z-10">
                            <h2 className="text-2xl font-bold text-slate-900">Checkout</h2>
                            <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center">
                                <Icon name="close" className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="p-6">
                            <div className="flex items-center gap-2 mb-6">
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${step >= 1 ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                    {step > 1 ? <Icon name="check" className="w-4 h-4" /> : '1'}
                                </div>
                                <div className={`flex-1 h-0.5 ${step >= 2 ? 'bg-slate-900' : 'bg-slate-200'}`}></div>
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${step >= 2 ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                    2
                                </div>
                            </div>

                            {step === 1 ? (
                                <form onSubmit={handleContinueToPayment} className="space-y-4">
                                    <h3 className="font-semibold text-slate-900 mb-2">Shipping Information</h3>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
                                        <input required name="name" value={formData.name} onChange={handleChange}
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                            placeholder="John Doe" />
                                    </div>
                                    <div className="grid sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Email *</label>
                                            <input required type="email" name="email" value={formData.email} onChange={handleChange}
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                                placeholder="john@example.com" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Phone *</label>
                                            <input required type="tel" name="phone" value={formData.phone} onChange={handleChange}
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                                placeholder="+1 234 567 8900" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Address *</label>
                                        <input required name="address" value={formData.address} onChange={handleChange}
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                            placeholder="123 Main Street" />
                                    </div>
                                    <div className="grid sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">City *</label>
                                            <input required name="city" value={formData.city} onChange={handleChange}
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                                placeholder="New York" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">ZIP Code *</label>
                                            <input required name="zip" value={formData.zip} onChange={handleChange}
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                                placeholder="10001" />
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-4 rounded-xl my-6">
                                        <h4 className="font-semibold text-slate-900 mb-3">Order Summary</h4>
                                        <div className="space-y-1.5 text-sm">
                                            <div className="flex justify-between text-slate-600">
                                                <span>Subtotal ({cart.reduce((s,i) => s + i.qty, 0)} items)</span>
                                                <span>${subtotal.toFixed(2)}</span>
                                            </div>
                                            <div className="flex justify-between text-slate-600">
                                                <span>Shipping</span>
                                                <span className="text-emerald-600">FREE</span>
                                            </div>
                                            <div className="flex justify-between text-slate-600">
                                                <span>Tax</span>
                                                <span>${tax.toFixed(2)}</span>
                                            </div>
                                            <div className="divider-gradient my-2"></div>
                                            <div className="flex justify-between text-base font-bold text-slate-900">
                                                <span>Total</span>
                                                <span>${total.toFixed(2)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-slate-900 text-white py-3.5 rounded-xl font-semibold hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                                        Continue to Payment
                                        <Icon name="arrow" className="w-4 h-4" />
                                    </button>
                                </form>
                            ) : (
                                <form onSubmit={handleCompletePurchase} className="space-y-4">
                                    <h3 className="font-semibold text-slate-900 mb-2">Payment Information</h3>
                                    <div className="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg text-sm flex items-start gap-2">
                                        <span>🧪</span>
                                        <span>This is a <strong>demo checkout</strong>. No real payment will be processed. Use any test data.</span>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Card Number</label>
                                        <input name="cardNumber" value={formData.cardNumber} onChange={handleChange}
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                            placeholder="4242 4242 4242 4242" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Cardholder Name</label>
                                        <input name="cardName" value={formData.cardName} onChange={handleChange}
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                            placeholder="John Doe" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Expiry Date</label>
                                            <input name="expiry" value={formData.expiry} onChange={handleChange}
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                                placeholder="MM/YY" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">CVV</label>
                                            <input name="cvv" value={formData.cvv} onChange={handleChange}
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                                                placeholder="123" />
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-4 rounded-xl my-6">
                                        <div className="flex justify-between text-lg font-bold text-slate-900">
                                            <span>Total to Pay</span>
                                            <span>${total.toFixed(2)}</span>
                                        </div>
                                    </div>

                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setStep(1)} className="flex-1 border-2 border-slate-300 text-slate-700 py-3 rounded-xl font-semibold hover:bg-slate-50">
                                            Back
                                        </button>
                                        <button type="submit" className="flex-[2] bg-slate-900 text-white py-3.5 rounded-xl font-semibold hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                                            <Icon name="check" className="w-4 h-4" />
                                            Complete Purchase
                                        </button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // THANK YOU MODAL
        // ==========================================
        const ThankYouModal = ({ isOpen, onClose, orderData }) => {
            if (!isOpen) return null;
            const orderId = 'ORD-' + Date.now().toString().slice(-8);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop animate-fadeIn">
                    <div className="bg-white rounded-2xl max-w-md w-full shadow-2xl text-center p-8 animate-slideInUp">
                        <div className="w-20 h-20 mx-auto mb-4 bg-emerald-100 rounded-full flex items-center justify-center animate-pulse-soft">
                            <Icon name="check" className="w-10 h-10 text-emerald-600" />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-900 mb-2">Order Completed Successfully!</h2>
                        <p className="text-slate-600 mb-6">Thank you for your purchase. A confirmation email has been sent.</p>

                        <div className="bg-slate-50 rounded-xl p-4 mb-6 text-left space-y-2 text-sm">
                            <div className="flex justify-between">
                                <span className="text-slate-500">Order ID</span>
                                <span className="font-semibold text-slate-900">{orderId}</span>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-slate-500">Customer</span>
                                <span className="font-semibold text-slate-900">{orderData?.name || 'Customer'}</span>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-slate-500">Email</span>
                                <span className="font-semibold text-slate-900 text-xs">{orderData?.email}</span>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-slate-500">Total</span>
                                <span className="font-bold text-slate-900">${orderData?.total?.toFixed(2)}</span>
                            </div>
                        </div>

                        <div className="bg-blue-50 border border-blue-100 rounded-lg p-3 mb-6 text-xs text-blue-800">
                            <strong>🎯 Tracking Fired:</strong> <code className="bg-blue-100 px-1 rounded">purchase</code> event has been pushed to dataLayer.
                        </div>

                        <button onClick={onClose} className="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-slate-800 transition-colors">
                            Continue Shopping
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // NEWSLETTER (Generate Lead)
        // ==========================================
        const Newsletter = () => {
            const [email, setEmail] = useState('');
            const [submitted, setSubmitted] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (email) {
                    trackEvent('generate_lead', {
                        currency: "USD",
                        value: 0,
                        lead_source: "newsletter_footer"
                    });
                    setSubmitted(true);
                    setEmail('');
                    setTimeout(() => setSubmitted(false), 4000);
                }
            };

            return (
                <div className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl p-8 md:p-12 text-white text-center">
                    <h3 className="text-2xl md:text-3xl font-bold mb-3">Subscribe to Our Newsletter</h3>
                    <p className="text-slate-300 mb-6 max-w-md mx-auto">Get the latest deals, exclusive offers, and 10% off your first order.</p>
                    <form onSubmit={handleSubmit} className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                        <input
                            type="email"
                            value={email}
                            onChange={(e) => setEmail(e.target.value)}
                            required
                            placeholder="Enter your email"
                            className="flex-1 px-4 py-3 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500"
                        />
                        <button type="submit" className="bg-brand-500 hover:bg-brand-600 text-white px-6 py-3 rounded-xl font-semibold transition-colors">
                            Subscribe
                        </button>
                    </form>
                    {submitted && (
                        <p className="mt-4 text-emerald-400 text-sm animate-fadeIn">✅ Thanks! Check console for generate_lead event.</p>
                    )}
                </div>
            );
        };

        // ==========================================
        // MAIN APP
        // ==========================================
        const App = () => {
            const [cart, setCart] = useState([]);
            const [wishlist, setWishlist] = useState([]);
            const [recentlyViewed, setRecentlyViewed] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
            const [isThankYouOpen, setIsThankYouOpen] = useState(false);
            const [orderData, setOrderData] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [sortBy, setSortBy] = useState('featured');
            const [toast, setToast] = useState(null);
            const itemsListTracked = useRef(false);

            // Load from localStorage
            useEffect(() => {
                const savedCart = localStorage.getItem('shoplab_cart');
                const savedWishlist = localStorage.getItem('shoplab_wishlist');
                if (savedCart) setCart(JSON.parse(savedCart));
                if (savedWishlist) setWishlist(JSON.parse(savedWishlist));
            }, []);

            // Save to localStorage
            useEffect(() => {
                localStorage.setItem('shoplab_cart', JSON.stringify(cart));
            }, [cart]);

            useEffect(() => {
                localStorage.setItem('shoplab_wishlist', JSON.stringify(wishlist));
            }, [wishlist]);

            // Filter + sort products
            const filteredProducts = useMemo(() => {
                let filtered = PRODUCTS.filter(p => {
                    const matchCat = activeCategory === 'All' || p.category === activeCategory;
                    const matchSearch = !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.brand.toLowerCase().includes(searchQuery.toLowerCase()) || p.category.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchCat && matchSearch;
                });

                if (sortBy === 'price-low') filtered = [...filtered].sort((a,b) => a.price - b.price);
                else if (sortBy === 'price-high') filtered = [...filtered].sort((a,b) => b.price - a.price);
                else if (sortBy === 'rating') filtered = [...filtered].sort((a,b) => b.rating - a.rating);

                return filtered;
            }, [activeCategory, searchQuery, sortBy]);

            // Track view_item_list once
            useEffect(() => {
                if (!itemsListTracked.current && filteredProducts.length > 0) {
                    trackEvent('view_item_list', {
                        item_list_name: activeCategory,
                        items: filteredProducts.slice(0, 12).map((p, i) => ({
                            item_id: p.id,
                            item_name: p.name,
                            item_category: p.category,
                            item_brand: p.brand,
                            price: p.price,
                            index: i
                        }))
                    });
                    itemsListTracked.current = true;
                }
            }, [filteredProducts, activeCategory]);

            // Search tracking
            useEffect(() => {
                const t = setTimeout(() => {
                    if (searchQuery.trim().length > 2) {
                        trackEvent('search', {
                            search_term: searchQuery,
                            item_list_name: activeCategory
                        });
                    }
                }, 1500);
                return () => clearTimeout(t);
            }, [searchQuery]);

            const showToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 2500);
            };

            const handleAddToCart = (product, qty = 1) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === product.id);
                    if (existing) {
                        return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + qty } : i);
                    }
                    return [...prev, { ...product, qty }];
                });

                trackEvent('add_to_cart', {
                    currency: "USD",
                    value: product.price * qty,
                    items: [{
                        item_id: product.id,
                        item_name: product.name,
                        item_category: product.category,
                        item_brand: product.brand,
                        price: product.price,
                        quantity: qty
                    }]
                });

                showToast(`✅ ${product.name} added to cart!`);
            };

            const handleUpdateQty = (id, qty) => {
                if (qty < 1) return;
                setCart(prev => prev.map(i => i.id === id ? { ...i, qty } : i));
            };

            const handleRemove = (id) => {
                setCart(prev => prev.filter(i => i.id !== id));
            };

            const handleOpenProduct = (product) => {
                setSelectedProduct(product);
                setRecentlyViewed(prev => {
                    const filtered = prev.filter(p => p.id !== product.id);
                    return [product, ...filtered].slice(0, 4);
                });
            };

            const handleToggleWishlist = (id) => {
                setWishlist(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const handleBuyNow = (product, qty) => {
                setSelectedProduct(null);
                const buyItem = { ...product, qty };
                const tempCart = [buyItem];
                setCart(tempCart);
                setIsCheckoutOpen(true);
            };

            const handleCheckout = () => {
                setIsCartOpen(false);
                setIsCheckoutOpen(true);
            };

            const handleCompleteOrder = (formData) => {
                const transactionId = 'T-' + Date.now();
                const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0) * 1.08;

                trackEvent('purchase', {
                    transaction_id: transactionId,
                    currency: "USD",
                    value: total,
                    tax: total * 0.08 / 1.08,
                    shipping: 0,
                    items: cart.map(item => ({
                        item_id: item.id,
                        item_name: item.name,
                        item_category: item.category,
                        item_brand: item.brand,
                        price: item.price,
                        quantity: item.qty
                    }))
                });

                setOrderData({ ...formData, total });
                setCart([]);
                setIsCheckoutOpen(false);
                setIsThankYouOpen(true);
            };

            const cartCount = cart.reduce((s, i) => s + i.qty, 0);

            return (
                <div className="min-h-screen">
                    {/* HEADER */}
                    <header className="sticky top-0 z-30 bg-white/80 backdrop-blur-lg border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center gap-4">
                            <a href="#home" className="text-2xl font-black tracking-tight text-slate-900">
                                Shop<span className="text-brand-600">Lab</span>
                            </a>
                            <span className="hidden md:inline-block text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full font-medium">
                                🧪 Tracking Demo
                            </span>

                            <div className="flex-1 max-w-xl mx-auto relative">
                                <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    placeholder="Search products, brands, categories..."
                                    className="w-full pl-10 pr-4 py-2.5 bg-slate-100 border border-transparent rounded-xl text-sm focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition-all"
                                />
                            </div>

                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setIsCartOpen(true)}
                                    className="relative w-10 h-10 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-colors"
                                    aria-label="Open cart"
                                >
                                    <Icon name="cart" className="w-5 h-5 text-slate-700" />
                                    {cartCount > 0 && (
                                        <>
                                            <span className="absolute -top-1 -right-1 min-w-[20px] h-5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center px-1">
                                                {cartCount}
                                            </span>
                                            <span className="pulse-dot"></span>
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* HERO */}
                    <section id="home" className="hero-gradient">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 md:py-24 grid md:grid-cols-2 gap-12 items-center">
                            <div className="animate-slideInUp">
                                <span className="inline-block bg-white border border-slate-200 text-slate-700 text-xs font-semibold px-3 py-1.5 rounded-full mb-5">
                                    ✨ New Collection 2025
                                </span>
                                <h1 className="text-4xl md:text-6xl font-black text-slate-900 leading-tight mb-5">
                                    Discover Your <span className="text-brand-600">Perfect Style</span>
                                </h1>
                                <p className="text-lg text-slate-600 mb-8 max-w-lg">
                                    Premium products across electronics, fashion, home & fitness. Built for learning modern ecommerce tracking.
                                </p>
                                <div className="flex flex-wrap gap-3">
                                    <a href="#products" className="inline-flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-6 py-3.5 rounded-xl font-semibold transition-colors">
                                        Shop Now
                                        <Icon name="arrow" className="w-4 h-4" />
                                    </a>
                                    <a href="#features" className="inline-flex items-center gap-2 bg-white border border-slate-200 hover:border-slate-300 text-slate-900 px-6 py-3.5 rounded-xl font-semibold transition-colors">
                                        Learn More
                                    </a>
                                </div>
                                <div className="mt-10 flex items-center gap-6 text-sm text-slate-600">
                                    <div className="flex items-center gap-2">
                                        <Icon name="check" className="w-4 h-4 text-emerald-500" />
                                        <span>Free Shipping</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <Icon name="check" className="w-4 h-4 text-emerald-500" />
                                        <span>30-day Returns</span>
                                    </div>
                                </div>
                            </div>

                            <div className="relative animate-slideInUp">
                                <div className="aspect-square rounded-3xl overflow-hidden shadow-2xl">
                                    <img
                                        src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=800&q=80"
                                        alt="Hero product showcase"
                                        className="w-full h-full object-cover"
                                    />
                                </div>
                                <div className="absolute -bottom-4 -left-4 bg-white rounded-2xl p-4 shadow-xl hidden sm:block">
                                    <div className="flex items-center gap-3">
                                        <div className="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center">
                                            <Icon name="star" className="w-6 h-6 text-amber-500" />
                                        </div>
                                        <div>
                                            <div className="font-bold text-slate-900">4.8/5</div>
                                            <div className="text-xs text-slate-500">10K+ Reviews</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="absolute -top-4 -right-4 bg-white rounded-2xl p-4 shadow-xl hidden sm:block">
                                    <div className="text-xs text-slate-500 mb-1">Total Products</div>
                                    <div className="text-2xl font-black text-slate-900">12+</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* FEATURES */}
                    <section id="features" className="py-16 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl md:text-4xl font-black text-slate-900 mb-3">Why Shop With Us</h2>
                                <p className="text-slate-600 max-w-2xl mx-auto">Premium service and quality, every step of the way.</p>
                            </div>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {[
                                    { icon: "truck", title: "Fast Delivery", desc: "Free shipping on all orders over $50. Delivered in 2-3 days." },
                                    { icon: "shield", title: "Secure Payment", desc: "256-bit SSL encryption. Your data is always safe with us." },
                                    { icon: "badge", title: "Premium Quality", desc: "Curated products from trusted brands around the world." },
                                    { icon: "refresh", title: "Easy Returns", desc: "30-day hassle-free return policy. No questions asked." }
                                ].map((f, i) => (
                                    <div key={i} className="bg-slate-50 rounded-2xl p-6 hover:shadow-lg transition-shadow">
                                        <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center mb-4 shadow-sm">
                                            <Icon name={f.icon} className="w-6 h-6 text-brand-600" />
                                        </div>
                                        <h3 className="font-bold text-slate-900 mb-2">{f.title}</h3>
                                        <p className="text-sm text-slate-600">{f.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* PRODUCTS */}
                    <section id="products" className="py-16">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                                <div>
                                    <h2 className="text-3xl md:text-4xl font-black text-slate-900 mb-2">Featured Products</h2>
                                    <p className="text-slate-600">{filteredProducts.length} products found</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    <select
                                        value={sortBy}
                                        onChange={(e) => setSortBy(e.target.value)}
                                        className="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium focus:ring-2 focus:ring-brand-500 outline-none"
                                    >
                                        <option value="featured">Featured</option>
                                        <option value="price-low">Price: Low to High</option>
                                        <option value="price-high">Price: High to Low</option>
                                        <option value="rating">Top Rated</option>
                                    </select>
                                </div>
                            </div>

                            <div className="flex flex-wrap gap-2 mb-8">
                                {CATEGORIES.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => setActiveCategory(cat)}
                                        className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeCategory === cat ? 'bg-slate-900 text-white' : 'bg-white text-slate-700 border border-slate-200 hover:border-slate-400'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {filteredProducts.length === 0 ? (
                                <div className="text-center py-20 bg-white rounded-2xl">
                                    <div className="text-6xl mb-4">🔍</div>
                                    <h3 className="text-xl font-bold text-slate-900 mb-2">No products found</h3>
                                    <p className="text-slate-600">Try adjusting your filters or search query</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {filteredProducts.map(p => (
                                        <ProductCard
                                            key={p.id}
                                            product={p}
                                            onOpen={handleOpenProduct}
                                            onAddToCart={handleAddToCart}
                                            onToggleWishlist={handleToggleWishlist}
                                            isWishlisted={wishlist.includes(p.id)}
                                        />
                                    ))}
                                </div>
                            )}

                            {recentlyViewed.length > 0 && (
                                <div className="mt-16">
                                    <h3 className="text-2xl font-bold text-slate-900 mb-6">Recently Viewed</h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                                        {recentlyViewed.map(p => (
                                            <div key={p.id} onClick={() => handleOpenProduct(p)} className="bg-white rounded-xl border border-slate-200 p-3 cursor-pointer hover:shadow-lg transition-shadow">
                                                <img src={p.image} alt={p.name} className="aspect-square w-full object-cover rounded-lg mb-2" />
                                                <div className="text-sm font-medium text-slate-900 line-clamp-1">{p.name}</div>
                                                <div className="text-sm font-bold text-slate-900">${p.price.toFixed(2)}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </section>

                    {/* NEWSLETTER (Generate Lead) */}
                    <section className="py-16">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6">
                            <Newsletter />
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-slate-900 text-slate-400 py-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6">
                            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
                                <div>
                                    <h4 className="text-white font-bold text-lg mb-3">Shop<span className="text-brand-500">Lab</span></h4>
                                    <p className="text-sm">A demo ecommerce store for practicing analytics tracking implementation.</p>
                                </div>
                                <div>
                                    <h4 className="text-white font-semibold mb-3">Shop</h4>
                                    <ul className="space-y-2 text-sm">
                                        <li>Electronics</li>
                                        <li>Fashion</li>
                                        <li>Home</li>
                                        <li>Fitness</li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="text-white font-semibold mb-3">Tracking</h4>
                                    <ul className="space-y-2 text-sm">
                                        <li>GTM Ready</li>
                                        <li>GA4 Enhanced Ecommerce</li>
                                        <li>Meta Pixel + CAPI</li>
                                        <li>Open Browser Console</li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="text-white font-semibold mb-3">Events Tracked</h4>
                                    <ul className="space-y-2 text-sm font-mono">
                                        <li>page_view</li>
                                        <li>view_item</li>
                                        <li>add_to_cart</li>
                                        <li>purchase</li>
                                    </ul>
                                </div>
                            </div>
                            <div className="border-t border-slate-800 pt-6 text-center text-sm">
                                <p>© 2025 ShopLab. For learning purposes only. No real transactions occur.</p>
                            </div>
                        </div>
                    </footer>

                    {/* MODALS & DRAWERS */}
                    <ProductModal
                        product={selectedProduct}
                        onClose={() => setSelectedProduct(null)}
                        onAddToCart={(p, q) => { handleAddToCart(p, q); setSelectedProduct(null); }}
                        onBuyNow={handleBuyNow}
                    />
                    <CartDrawer
                        isOpen={isCartOpen}
                        onClose={() => setIsCartOpen(false)}
                        cart={cart}
                        onUpdateQty={handleUpdateQty}
                        onRemove={handleRemove}
                        onCheckout={handleCheckout}
                    />
                    <CheckoutModal
                        isOpen={isCheckoutOpen}
                        onClose={() => setIsCheckoutOpen(false)}
                        cart={cart}
                        onComplete={handleCompleteOrder}
                    />
                    <ThankYouModal
                        isOpen={isThankYouOpen}
                        onClose={() => setIsThankYouOpen(false)}
                        orderData={orderData}
                    />

                    {/* TOAST */}
                    {toast && (
                        <div className="fixed bottom-6 right-6 z-50 toast">
                            <div className="bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium">
                                {toast}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Mount
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
```
